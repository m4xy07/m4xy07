name: Update README Stat Cards 📊

on:
  schedule:
    - cron: "0 3 * * *"     # daily at 03:00 UTC
  workflow_dispatch:          # manual trigger from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - 'profile/**'          # don't re-trigger on the cards this workflow commits

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (cosmic theme)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true&hide_border=true&bg_color=0d0221&title_color=a78bfa&icon_color=87ceeb&text_color=c9d1d9&ring_color=8b5cf6
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-languages card (cosmic theme)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&bg_color=0d0221&title_color=a78bfa&text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push refreshed cards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: refresh README stat cards [skip ci]" || echo "no changes to commit"
          git push
