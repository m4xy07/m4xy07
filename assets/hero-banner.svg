<svg viewBox="0 0 1200 320" width="1200" height="320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aman Shaikh - Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0316"/>
      <stop offset="55%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#070118"/>
    </linearGradient>
    <radialGradient id="neb" cx="50%" cy="8%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#6d28d9" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0d0221" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="30%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8c8ff"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="75%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="hr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="soft2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .st { animation-name: tw; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
      @keyframes tw { 0%,100% { opacity: var(--b); } 50% { opacity: 1; } }
      .breathe { animation: br 7s ease-in-out infinite; transform-origin: 600px 30px; }
      @keyframes br { 0%,100% { opacity:.85; transform: scale(1); } 50% { opacity:1; transform: scale(1.06); } }
      .pulse { animation: pu 4.5s ease-in-out infinite; transform-origin: 600px 66px; }
      @keyframes pu { 0%,100% { transform: scale(1); opacity:.95 } 50% { transform: scale(1.09); opacity:1 } }
      .ring { animation: rot 26s linear infinite; transform-origin: 600px 66px; }
      .ring2 { animation: rot 18s linear infinite reverse; transform-origin: 600px 66px; }
      @keyframes rot { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
      .spark { animation: sp 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes sp { 0%,100% { opacity:0; transform: scale(.4) rotate(0deg) } 50% { opacity:1; transform: scale(1) rotate(45deg) } }
      .word { animation: fade 1.4s ease-out both; }
      @keyframes fade { from { opacity:0; } to { opacity:1; } }
      .sub { animation: fade 1.6s ease-out .5s both; }
      .sweep { animation: sweep 5.5s ease-in-out infinite; }
      @keyframes sweep { 0% { transform: translateX(-120px); opacity:0 } 35% { opacity:.9 } 70% { opacity:0 } 100% { transform: translateX(120px); opacity:0 } }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <ellipse class="breathe" cx="600" cy="20" rx="520" ry="190" fill="url(#neb)" filter="url(#soft)"/>
  <ellipse cx="250" cy="250" rx="180" ry="120" fill="url(#neb2)" filter="url(#soft)" opacity="0.6"/>
  <ellipse cx="980" cy="240" rx="160" ry="120" fill="url(#neb2)" filter="url(#soft)" opacity="0.5"/>

